# Cloud Media News - Coolify Deployment Configuration
# This file is used by Coolify for automated deployments

# Application Information
name: cloudmedia-news
description: Complete digital news platform built with React, TypeScript, and Supabase

# Build Configuration
build:
  type: dockerfile
  dockerfile: Dockerfile
  
# Deploy Configuration
deploy:
  type: docker-compose
  docker-compose: docker-compose.yml

# Environment Variables (configure in Coolify UI)
environment:
  - VITE_SUPABASE_URL=your_supabase_url
  - VITE_SUPABASE_ANON_KEY=your_supabase_anon_key
  - VITE_GA_MEASUREMENT_ID=your_ga_id
  - VITE_ADSENSE_CLIENT=your_adsense_id
  - VITE_SITE_URL=your_site_url

# Port Configuration
ports:
  - "80:80"

# Health Check
health_check:
  endpoint: /
  interval: 30s
  timeout: 10s
  retries: 3

# Resource Limits
resources:
  limits:
    cpus: '1.0'
    memory: 512M
  reservations:
    cpus: '0.25'
    memory: 256M

# Persistent Storage (optional)
volumes:
  - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

# Networking
networks:
  - cloudmedia-network

# Auto Deploy Settings
auto_deploy: true
preview_deployments: false
